    // ===== 核心函数 =====
    function getCategories() { const s=new Set(); IMAGE_DATA.forEach(i=>{ if(i.path) s.add(i.category); }); return Array.from(s).sort(); }

    function renderTags() {
        const container = document.getElementById('tagContainer');
        const cats = getCategories();
        let html = '';
        cats.forEach(cat => {
            html += `<span class="tag" data-filter="${cat}">${cat}</span>`;
        });
        container.innerHTML = html;
        document.querySelectorAll('.tag[data-filter]').forEach(el => {
            el.addEventListener('click', function() {
                document.querySelectorAll('.tag[data-filter]').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                applyFilters();
            });
        });
        document.querySelector('.tag[data-filter="all"]')?.addEventListener('click', function() {
            document.querySelectorAll('.tag[data-filter]').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            applyFilters();
        });
    }

    function getActiveFilter() { const a = document.querySelector('.tag[data-filter].active'); return a ? a.dataset.filter : 'all'; }
    function getSearchKeyword() { return document.getElementById('searchInput').value.trim().toLowerCase(); }

    function getFilteredData() {
        const filter = getActiveFilter();
        const keyword = getSearchKeyword();
        return IMAGE_DATA.filter(item => {
            if (!item.path) return false;
            if (filter !== 'all' && item.category !== filter) return false;
            if (keyword && !item.name.toLowerCase().includes(keyword) && !item.category.toLowerCase().includes(keyword)) return false;
            return true;
        });
    }

    function renderGrid() {
        const grid = document.getElementById('imageGrid');
        const filtered = getFilteredData();
        document.getElementById('totalCount').textContent = IMAGE_DATA.filter(d => d.path).length;
        document.getElementById('categoryCount').textContent = getCategories().length;
        document.getElementById('activeCount').textContent = filtered.length;

        if (filtered.length === 0) {
            grid.innerHTML = `<div class="empty-state"><span>🔍</span>没有找到匹配的数据视图<br/><small style="color:rgba(200,185,160,0.2);font-size:13px;">试试调整筛选或搜索关键词</small></div>`;
            return;
        }
        let html = '';
        filtered.forEach((item, index) => {
            let p = item.path.replace(/\\/g, '/');
            if (!p.startsWith('./')) p = './' + p;
            html += `
                <div class="card" data-id="${item.id}" data-name="${item.name}" data-category="${item.category}" data-path="${p}" data-description="${item.description || ''}">
                    <div class="card-img-wrapper">
                        <img src="${p}" alt="${item.name}" loading="lazy" decoding="async" fetchpriority="low"
                             onload="this.classList.add('loaded')" 
                             onerror="this.style.opacity='0.2'; this.parentElement.innerHTML='<div style=\\'display:flex;align-items:center;justify-content:center;height:100%;color:rgba(200,185,160,0.2);font-size:14px;\\'>⚠️ 图片加载失败<br/><span style=\\'font-size:11px;\\'>${item.name}</span></div>'"/>
                        <span class="card-index">#${String(index+1).padStart(2,'0')}</span>
                    </div>
                    <div class="card-info">
                        <span class="name" title="${item.name}">${item.name}</span>
                        <span class="badge">${item.category}</span>
                    </div>
                </div>
            `;
        });
        grid.innerHTML = html;
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', function() {
                const name = this.dataset.name;
                const category = this.dataset.category;
                const path = this.dataset.path;
                const description = this.dataset.description || '（暂无讲解）';
                openModal(path, name, category, description);
            });
        });
    }

    // ===== 模态框控制（含缩放拖拽） =====
    let currentScale = 1;
    let panX = 0, panY = 0;
    let isDragging = false;
    let startX, startY, startPanX, startPanY;

    function resetTransform() {
        currentScale = 1;
        panX = 0;
        panY = 0;
        const img = document.getElementById('modalImage');
        img.style.transform = `scale(${currentScale}) translate(${panX}px, ${panY}px)`;
    }

    function openModal(path, name, category, description) {
        const overlay = document.getElementById('modal');
        const img = document.getElementById('modalImage');
        const cap = document.getElementById('modalCaption');
        const desc = document.getElementById('modalDescription');

        let p = path.replace(/\\/g, '/');
        if (!p.startsWith('./')) p = './' + p;
        img.src = p;
        img.alt = name;
        cap.innerHTML = `${name} <small>${category}</small>`;
        desc.textContent = description;
        resetTransform();
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('active');
        document.body.style.overflow = '';
    }

    // ===== 滚轮缩放 =====
    document.getElementById('modalImageWrapper').addEventListener('wheel', function(e) {
        e.preventDefault();
        const delta = e.deltaY > 0 ? -0.1 : 0.1;
        const img = document.getElementById('modalImage');
        const rect = img.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width;
        const y = (e.clientY - rect.top) / rect.height;
        let newScale = currentScale + delta;
        newScale = Math.min(Math.max(newScale, 0.5), 10);
        if (newScale === currentScale) return;
        const scaleRatio = newScale / currentScale;
        const cx = rect.width * x;
        const cy = rect.height * y;
        panX = (panX + cx) * scaleRatio - cx;
        panY = (panY + cy) * scaleRatio - cy;
        currentScale = newScale;
        img.style.transform = `scale(${currentScale}) translate(${panX}px, ${panY}px)`;
    }, { passive: false });

    // ===== 拖拽移动 =====
    const wrapper = document.getElementById('modalImageWrapper');
    const img = document.getElementById('modalImage');

    wrapper.addEventListener('mousedown', function(e) {
        if (e.target.tagName === 'IMG') {
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            startPanX = panX;
            startPanY = panY;
            wrapper.style.cursor = 'grabbing';
            e.preventDefault();
        }
    });
    document.addEventListener('mousemove', function(e) {
        if (!isDragging) return;
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        panX = startPanX + dx;
        panY = startPanY + dy;
        img.style.transform = `scale(${currentScale}) translate(${panX}px, ${panY}px)`;
    });
    document.addEventListener('mouseup', function() {
        if (isDragging) {
            isDragging = false;
            wrapper.style.cursor = 'grab';
        }
    });

    // ===== 查看原图 =====
    document.getElementById('viewOriginalBtn').addEventListener('click', function() {
        const img = document.getElementById('modalImage');
        if (img.src) window.open(img.src, '_blank');
    });

    // ===== 事件绑定 =====
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

    document.getElementById('searchBtn').addEventListener('click', applyFilters);
    document.getElementById('searchInput').addEventListener('keyup', function(e) { if (e.key === 'Enter') applyFilters(); });

    function applyFilters() { renderGrid(); }

    // ===== 初始化 =====
    function init() {
        renderTags();
        renderGrid();
        document.querySelector('.tag[data-filter="all"]')?.classList.add('active');
        document.querySelectorAll('.tag[data-filter]:not([data-filter="all"])').forEach(t => t.classList.remove('active'));
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();
</script>
