<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>石油招聘 · 数据可视化</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ===== 全局 ===== */
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#0b0a0a; background-image:radial-gradient(ellipse at 20% 50%, rgba(180,130,50,0.08) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(180,130,50,0.05) 0%, transparent 50%), linear-gradient(180deg,#0b0a0a 0%,#1a1410 100%); min-height:100vh; color:#e8e0d4; padding:20px; }
        ::-webkit-scrollbar { width:6px; height:6px; }
        ::-webkit-scrollbar-track { background:#1a1410; }
        ::-webkit-scrollbar-thumb { background:#b8943c; border-radius:8px; }
        .container { max-width:1440px; margin:0 auto; }

        /* ===== 头部 ===== */
        .header { display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; padding:28px 32px 20px 32px; background:linear-gradient(135deg, rgba(30,25,20,0.9) 0%, rgba(15,12,10,0.95) 100%); border:1px solid rgba(184,148,60,0.25); border-radius:20px; box-shadow:0 20px 60px rgba(0,0,0,0.7); margin-bottom:32px; backdrop-filter:blur(10px); position:relative; overflow:hidden; }
        .header::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg, transparent, #b8943c, #f0d080, #b8943c, transparent); opacity:0.6; }
        .header-left { display:flex; align-items:center; gap:18px; z-index:1; }
        .logo-icon { font-size:36px; line-height:1; filter:drop-shadow(0 0 12px rgba(184,148,60,0.3)); }
        .header-title { font-family:'Playfair Display',serif; font-weight:700; font-size:28px; letter-spacing:2px; background:linear-gradient(135deg, #f0d080 0%, #b8943c 40%, #d4ae4a 70%, #f0d080 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .header-sub { font-size:13px; color:rgba(200,185,160,0.6); font-weight:300; letter-spacing:4px; margin-top:2px; }
        .header-right { display:flex; align-items:center; gap:20px; z-index:1; flex-wrap:wrap; }
        .header-stats { display:flex; gap:28px; }
        .stat-item { text-align:center; }
        .stat-number { font-family:'Playfair Display',serif; font-size:26px; font-weight:700; color:#f0d080; line-height:1.1; }
        .stat-label { font-size:11px; color:rgba(200,185,160,0.5); text-transform:uppercase; letter-spacing:2px; font-weight:400; }
        .stat-divider { width:1px; background:linear-gradient(180deg, transparent, rgba(184,148,60,0.3), transparent); }

        /* ===== 工具栏 ===== */
        .toolbar { display:flex; flex-wrap:wrap; gap:16px 24px; padding:16px 24px; background:rgba(20,17,14,0.7); border:1px solid rgba(184,148,60,0.12); border-radius:16px; margin-bottom:28px; backdrop-filter:blur(8px); align-items:center; justify-content:space-between; }
        .search-box { display:flex; align-items:center; background:rgba(255,255,255,0.04); border:1px solid rgba(184,148,60,0.2); border-radius:40px; padding:6px 6px 6px 20px; transition:all 0.3s ease; flex:1 1 260px; max-width:400px; }
        .search-box:focus-within { border-color:#b8943c; box-shadow:0 0 20px rgba(184,148,60,0.08); background:rgba(255,255,255,0.06); }
        .search-box input { background:transparent; border:none; outline:none; color:#e8e0d4; font-size:14px; padding:8px 0; width:100%; font-weight:300; letter-spacing:0.5px; }
        .search-box input::placeholder { color:rgba(200,185,160,0.3); }
        .search-box button { background:linear-gradient(135deg, #b8943c, #8a6f2e); border:none; color:#0b0a0a; padding:8px 20px; border-radius:40px; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.3s ease; white-space:nowrap; }
        .search-box button:hover { transform:scale(1.03); box-shadow:0 4px 20px rgba(184,148,60,0.3); }
        .filter-tags { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
        .filter-tags .label { font-size:12px; color:rgba(200,185,160,0.4); text-transform:uppercase; letter-spacing:2px; margin-right:4px; font-weight:400; }
        .tag { padding:6px 18px; border-radius:40px; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.3s ease; border:1px solid rgba(184,148,60,0.15); background:rgba(255,255,255,0.03); color:rgba(200,185,160,0.6); user-select:none; }
        .tag:hover { background:rgba(184,148,60,0.08); color:#e8e0d4; border-color:rgba(184,148,60,0.3); }
        .tag.active { background:linear-gradient(135deg, rgba(184,148,60,0.2), rgba(138,111,46,0.15)); border-color:#b8943c; color:#f0d080; box-shadow:0 0 20px rgba(184,148,60,0.05); }

        /* ===== 图片网格 ===== */
        .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px,1fr)); gap:24px; margin-top:4px; }
        .card { background:linear-gradient(145deg, rgba(25,21,17,0.9), rgba(15,12,10,0.95)); border:1px solid rgba(184,148,60,0.1); border-radius:16px; overflow:hidden; transition:all 0.4s cubic-bezier(0.25,0.46,0.45,0.94); cursor:pointer; position:relative; box-shadow:0 8px 30px rgba(0,0,0,0.3); }
        .card:hover { transform:translateY(-6px); border-color:rgba(184,148,60,0.3); box-shadow:0 20px 60px rgba(0,0,0,0.6); }
        .card-img-wrapper { width:100%; padding-top:62%; position:relative; background:#0a0808; overflow:hidden; background-color:#1a1510; }
        .card-img-wrapper img { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:contain; padding:12px; transition:transform 0.6s ease; background:#0a0808; }
        .card:hover .card-img-wrapper img { transform:scale(1.02); }
        .card-info { padding:18px 20px 20px 20px; display:flex; justify-content:space-between; align-items:center; border-top:1px solid rgba(184,148,60,0.06); }
        .card-info .name { font-weight:600; font-size:15px; color:#e8e0d4; letter-spacing:0.3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:70%; }
        .card-info .badge { font-size:11px; padding:4px 14px; border-radius:40px; background:rgba(184,148,60,0.12); border:1px solid rgba(184,148,60,0.08); color:#d4ae4a; font-weight:500; white-space:nowrap; }
        .card .card-index { position:absolute; top:12px; right:14px; font-family:'Playfair Display',serif; font-size:13px; color:rgba(184,148,60,0.2); font-weight:700; letter-spacing:1px; background:rgba(0,0,0,0.5); padding:2px 12px; border-radius:20px; backdrop-filter:blur(4px); border:1px solid rgba(184,148,60,0.05); }
        .empty-state { grid-column:1/-1; text-align:center; padding:80px 20px; color:rgba(200,185,160,0.3); }
        .empty-state span { font-size:48px; display:block; margin-bottom:16px; opacity:0.4; }

        /* ===== 模态框 ===== */
        .modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.92); backdrop-filter:blur(20px); z-index:9999; display:none; justify-content:center; align-items:center; padding:30px; animation:fadeIn 0.3s ease; }
        .modal-overlay.active { display:flex; }
        .modal-content { max-width:95vw; max-height:95vh; position:relative; background:rgba(15,12,10,0.98); border:1px solid rgba(184,148,60,0.3); border-radius:20px; padding:24px; box-shadow:0 40px 120px rgba(0,0,0,0.9); display:flex; flex-direction:column; overflow:hidden; }
        .modal-image-wrapper { position:relative; width:100%; max-height:65vh; overflow:auto; display:flex; justify-content:center; align-items:center; background:#0a0808; border-radius:12px; cursor:grab; }
        .modal-image-wrapper:active { cursor:grabbing; }
        .modal-image-wrapper img { max-width:100%; max-height:100%; object-fit:contain; transition:transform 0.1s; transform-origin:center; user-select:none; }
        .modal-close { position:absolute; top:12px; right:16px; font-size:28px; color:rgba(200,185,160,0.5); cursor:pointer; background:none; border:none; padding:4px 10px; border-radius:8px; }
        .modal-close:hover { color:#f0d080; background:rgba(184,148,60,0.1); }
        .modal-caption { padding:14px 8px 4px 8px; font-size:15px; text-align:center; border-top:1px solid rgba(184,148,60,0.06); margin-top:12px; }
        .modal-description { margin-top:10px; padding:10px 16px; background:rgba(255,255,255,0.05); border-radius:12px; color:#d0c8b8; font-size:14px; line-height:1.6; max-height:120px; overflow-y:auto; border:1px solid rgba(184,148,60,0.1); cursor:text; }
        .modal-description:focus { outline:2px solid #b8943c; }
        .modal-actions { display:flex; justify-content:center; gap:20px; margin-top:8px; }
        .modal-actions button { background:rgba(184,148,60,0.15); border:1px solid rgba(184,148,60,0.2); color:#d4ae4a; padding:6px 18px; border-radius:20px; font-size:12px; cursor:pointer; transition:all 0.2s; }
        .modal-actions button:hover { background:rgba(184,148,60,0.25); }
        .modal-actions .view-original { background:rgba(255,255,255,0.05); color:#b0a8a0; }
        .modal-actions .view-original:hover { background:rgba(255,255,255,0.1); color:#f0e8d8; }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        @media (max-width:600px) { .grid { grid-template-columns:1fr 1fr; gap:12px; } .header { padding:16px; } .header-title { font-size:22px; } .modal-content { padding:16px; } }
        @media (max-width:420px) { .grid { grid-template-columns:1fr; } }
    </style>
</head>

    <div class="grid" id="imageGrid"></div>
</div>

        <div class="modal-actions">

</div>
